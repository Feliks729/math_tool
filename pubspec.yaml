name: math_tool
description: "Образовательный математический инструмент для школьников."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  math_expressions: ^2.4.0
  flutter_math_fork: ^0.7.2
  flutter_riverpod: ^2.4.9
  riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_svg: ^2.0.9
  flutter_animate: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
